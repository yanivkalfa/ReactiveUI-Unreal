; Demo maps land in Phase 2 (MASTER_PLAN §3); the gallery map becomes the default then.

[/Script/Engine.Engine]
; The CommonUI plugin is enabled (ReactiveUICommonUI interop). CommonUI routes input through its own
; game viewport client — without this, Play logs "Using CommonUI without a CommonGameViewportClient
; derived game viewport client" and CommonUI input routing is dead. This is the real fix (not the
; CommonUI.Debug.CheckGameViewportClientValid=0 suppression).
GameViewportClientClassName=/Script/CommonUI.CommonGameViewportClient

[/Script/Engine.RendererSettings]
; Keep the demo project lightweight — no ray tracing / heavyweight defaults needed for UI work.
r.ReflectionMethod=0
r.DynamicGlobalIlluminationMethod=0

[/Script/EngineSettings.GameMapsSettings]
; Press Play on any level: the demo game mode mounts the ReactiveUI gallery over the viewport.
GlobalDefaultGameMode=/Script/RuiDemo.RuiDemoGameMode
; Featherweight startup map (engine Entry map): the 5.6 Open World template TDRs weak GPUs
; and the UI demo needs zero scene.
EditorStartupMap=/Engine/Maps/Entry
GameDefaultMap=/Engine/Maps/Entry

[SystemSettings]
; GPU relief for the UI demo on modest cards: no virtual shadow maps, cheap AA instead of TSR.
r.Shadow.Virtual.Enable=0
r.AntiAliasingMethod=1
