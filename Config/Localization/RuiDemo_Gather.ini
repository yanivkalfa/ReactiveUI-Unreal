;
; The demo project's localization target — AND the reference config for any project using
; ReactiveUI (docs: Localization page). The one non-default line that makes .uetkx text
; localizable is the `*.inl` FileNameFilters entry: the markup compiler emits every string
; literal as a self-namespaced NSLOCTEXT ("Uetkx.<FileBasename>") inside the COMMITTED
; *.uetkx.inl files, and the stock source gatherer only scans them if the mask says so.
;
; Run:  <Engine>\UnrealEditor-Cmd.exe <proj>.uproject -run=GatherText
;         -config=Config/Localization/RuiDemo_Gather.ini -unattended -nopause -nullrhi
; Output: Content/Localization/RuiDemo/ (manifest + archive + locres — committed; the
;         ReactiveUI.Loc.GatherManifest test tripwires on the manifest's Uetkx.* namespaces).

[CommonSettings]
SourcePath=Content/Localization/RuiDemo
DestinationPath=Content/Localization/RuiDemo
ManifestName=RuiDemo.manifest
ArchiveName=RuiDemo.archive
NativeCulture=en
CulturesToGenerate=en

;Gather text from source — the demo's screens AND the plugin's runtime strings.
[GatherTextStep0]
CommandletClass=GatherTextFromSource
SearchDirectoryPaths=%LOCPROJECTROOT%Source/
SearchDirectoryPaths=%LOCPROJECTROOT%Plugins/ReactiveUI/Source/
ExcludePathFilters=Config/Localization/*
ExcludePathFilters=*/RuiHostTests/*
ExcludePathFilters=*/ReactiveUIEditor/*
FileNameFilters=*.cpp
FileNameFilters=*.h
FileNameFilters=*.c
FileNameFilters=*.inl
FileNameFilters=*.ini

;Write Manifest
[GatherTextStep1]
CommandletClass=GenerateGatherManifest

;Write Archives
[GatherTextStep2]
CommandletClass=GenerateGatherArchive
bPurgeOldEmptyEntries=true

;Write Localized Text Resource
[GatherTextStep3]
CommandletClass=GenerateTextLocalizationResource
ResourceName=RuiDemo.locres
