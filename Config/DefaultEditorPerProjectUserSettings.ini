[/Script/LiveCoding.LiveCodingSettings]
; HMR v2 DX: run the Live Coding console windowless. Live Coding reads this at ITS OWN startup (before
; any plugin module loads), so it's the load-order-proof way to hide the console — the ReactiveUetkx HMR
; window is the visible status UI. The console process still runs as the compile server (it's launched
; with -Hidden). A user can override this per-machine from the HMR window's "Hide the Live Coding
; console" checkbox or Editor Preferences > Live Coding.
Startup=AutomaticButHidden
