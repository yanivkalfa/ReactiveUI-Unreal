# Keeps the two npm trees and the Actions pins fresh. NOTE: ide-extensions/lsp-server and
# ide-extensions/vscode-uetkx get their own npm entries when Phase 5 creates them — add the
# directories here in the same PR (dependabot warns on directories that don't exist).
version: 2
updates:
  - package-ecosystem: npm
    directory: "/ReactiveUIUnrealDocs~"
    schedule:
      interval: weekly
    groups:
      docs-deps:
        patterns: ["*"]
    ignore:
      # Majors are DELIBERATELY deferred: the docs site is a clone of the family shell
      # (ReactiveUI-Godot docs) and staying on the same majors keeps cross-repo shell syncs
      # cheap. Major migrations (MUI, eslint, TypeScript, ...) happen family-wide, on purpose,
      # not via weekly bot PRs. Minor/patch keep flowing.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
