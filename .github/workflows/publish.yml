# Publish — ONE Run-workflow button publishes everything whose version changed.
# THE OWNER presses it; the AI never triggers it (house law). Every shippable job reads its own
# version from its own manifest, checks whether the matching git tag exists, SKIPS if so, and
# tags-on-success — idempotent re-runs; un-bumped artifacts simply don't release.
# Tag scheme (MASTER_PLAN D-30): v* (plugin — ONE tag carries the Fab source zip + any per-engine
# zips as release assets), vscode-v*, vs2022-v*.
name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # Docs redeploy on every dispatch (not version-gated) — GitHub Pages serves the
  # `documentations` branch root (owner enables Pages once; see the ROADMAP setup checklist).
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Guard (docs scaffold present?)
        id: guard
        run: |
          if [ -f "ReactiveUIUnrealDocs~/package.json" ]; then echo "armed=true" >> "$GITHUB_OUTPUT"; else
            echo "docs not present yet — skipping deploy."; echo "armed=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.armed == 'true'
        with:
          node-version: 22
      - name: Build
        if: steps.guard.outputs.armed == 'true'
        working-directory: ReactiveUIUnrealDocs~
        run: npm ci && npm run build
      - name: Push dist/ to the documentations branch
        if: steps.guard.outputs.armed == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin documentations || true
          if git show-ref --quiet refs/remotes/origin/documentations; then
            git worktree add /tmp/docs-deploy origin/documentations
          else
            git worktree add --detach /tmp/docs-deploy
            (cd /tmp/docs-deploy && git checkout --orphan documentations && git rm -rf . >/dev/null 2>&1 || true)
          fi
          rm -rf /tmp/docs-deploy/*
          cp -r "ReactiveUIUnrealDocs~/dist"/* /tmp/docs-deploy/
          touch /tmp/docs-deploy/.nojekyll
          cd /tmp/docs-deploy
          git add -A
          if git diff --cached --quiet; then echo "no docs changes"; else
            git commit -m "docs: deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:documentations
          fi

  # The plugin release: tag v<VersionName> + GitHub Release whose body is the top `## [`
  # section of CHANGELOG.md. ALWAYS attaches the Fab-uploadable SOURCE zip (Plugins/ReactiveUI minus
  # build artifacts — Fab's reviewers build the binaries with Epic's toolchain). Engine-armed runs
  # additionally attach per-engine validated zips via verify-engines; unarmed runs (the default) note
  # that engine-validated per-engine zips come from the local rail (scripts/package-plugin.ps1).
  release-plugin:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      new_tag: ${{ steps.tagcheck.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Read VersionName
        id: ver
        run: echo "version=$(jq -r .VersionName Plugins/ReactiveUI/ReactiveUI.uplugin)" >> "$GITHUB_OUTPUT"
      - name: Tag exists? (idempotency gate)
        id: tagcheck
        run: |
          VER="${{ steps.ver.outputs.version }}"
          TAG="v$VER"
          # Pre-release guard: -dev (or any -suffix) VersionNames never tag/release — pressing
          # Publish mid-development must be a no-op for the plugin, not a "0.1.0-dev release".
          case "$VER" in
            *-*)
              echo "::notice::VersionName $VER is a pre-release suffix — plugin release skipped."
              echo "new_tag=false" >> "$GITHUB_OUTPUT"
              exit 0;;
          esac
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG exists — plugin not bumped; skipping."
            echo "new_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_tag=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract release body (top CHANGELOG section)
        if: steps.tagcheck.outputs.new_tag == 'true'
        run: |
          awk '/^## \[/{n++} n==1' CHANGELOG.md > /tmp/release-body.md
          printf '\n---\n_The attached `ReactiveUI-%s.zip` is the plugin **source** — upload it to Fab (Epic builds the binaries). For an engine-VALIDATED per-engine zip, run `scripts/package-plugin.ps1` locally (engine CI unarmed by default)._\n' "${{ steps.ver.outputs.version }}" >> /tmp/release-body.md
      - name: Package the Fab-uploadable source zip
        if: steps.tagcheck.outputs.new_tag == 'true'
        run: |
          mkdir -p dist
          # Fab wants the plugin folder (ReactiveUI/ at the archive root), source only — no build
          # output. Binaries/Intermediate are gitignored (not in a fresh checkout); exclude belt-and-
          # suspenders, and drop the machine-local diag sidecars.
          (cd Plugins && zip -r "$GITHUB_WORKSPACE/dist/ReactiveUI-${{ steps.ver.outputs.version }}.zip" ReactiveUI \
             -x 'ReactiveUI/Binaries/*' -x 'ReactiveUI/Intermediate/*' -x '*.uetkx.diags.json' -x '*/.git*')
          echo "Packaged: dist/ReactiveUI-${{ steps.ver.outputs.version }}.zip"
      - name: Tag + GitHub Release (with the Fab source zip attached)
        if: steps.tagcheck.outputs.new_tag == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "ReactiveUI for Unreal ${{ steps.ver.outputs.version }}" \
            --notes-file /tmp/release-body.md \
            "dist/ReactiveUI-${{ steps.ver.outputs.version }}.zip"

  # Pre-release engine verification + packaged per-engine zips — armed runs only. Reuses the SAME
  # engine workflow test.yml uses (one definition, no drift). Zip packaging on the Windows
  # self-hosted runner attaches per-engine assets to the release created above (added when the owner
  # stands the runner up — the job body documents the plan so arming is wiring, not design).
  verify-engines:
    needs: release-plugin
    if: needs.release-plugin.outputs.new_tag == 'true' && vars.RUI_CI_ENGINE_ARMED == 'true'
    strategy:
      fail-fast: false
      matrix:
        engine: ["5.6", "5.7", "5.8"]
    uses: ./.github/workflows/engine-tests.yml
    with:
      engine-version: ${{ matrix.engine }}
    secrets:
      EPIC_GHCR_PAT: ${{ secrets.EPIC_GHCR_PAT }}

  # VS Code extension — cross-platform (the server is a self-contained JS bundle, no native deps), so
  # ONE .vsix and ONE `vscode-v<ver>` tag. Idempotent: skips if the tag exists; tags only on a
  # successful VS Marketplace publish (Open VSX is best-effort). Bump package.json to ship a new one.
  publish-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Guard (extension present?) + idempotency tag
        id: check
        run: |
          if [ ! -f ide-extensions/vscode-uetkx/package.json ]; then
            echo "::notice::VS Code extension not present — nothing to publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          VERSION=$(node -p "require('./ide-extensions/vscode-uetkx/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git tag --list "vscode-v$VERSION" | grep -q .; then
            echo "::notice::VS Code extension v$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: 22
      - name: Build server + bundle + build extension
        if: steps.check.outputs.skip == 'false'
        run: |
          (cd ide-extensions/lsp-server && npm ci && npm run build)
          node ide-extensions/scripts/changelog.mjs extract --ide vscode --out ide-extensions/vscode-uetkx/CHANGELOG.md
          # `npm run build` = tsc + scripts/bundle-server.mjs (bundles the just-built lsp-server) — no separate call.
          (cd ide-extensions/vscode-uetkx && npm ci && npm run build)
      - name: Generate README.md from centralized changelog
        if: steps.check.outputs.skip == 'false'
        run: node ide-extensions/scripts/changelog.mjs extract-overview --ide vscode --template ide-extensions/vscode-uetkx/readme-template.md --out ide-extensions/vscode-uetkx/README.md
      - name: Stage bundled clangd (pinned 22.1.6, sha256-verified — §5)
        if: steps.check.outputs.skip == 'false'
        run: node ide-extensions/scripts/fetch-clangd.mjs --target vscode
      - name: Package BOTH VSIX flavors (win32-x64 with clangd + universal without)
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions/vscode-uetkx
        run: |
          # platform flavor first (clangd/ staged in), then the universal one with the staging
          # dir moved aside — vsce has one .vscodeignore, so the gate is physical (§5.2).
          npx --yes @vscode/vsce package --no-dependencies --target win32-x64 -o uetkx-win32-x64.vsix
          mv clangd ../.clangd-staged-aside
          npx --yes @vscode/vsce package --no-dependencies -o uetkx.vsix
          mv ../.clangd-staged-aside clangd
      - name: Publish to VS Marketplace (both flavors — the marketplace routes per platform)
        id: publish-vsce
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions/vscode-uetkx
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npx --yes @vscode/vsce publish --no-dependencies --packagePath uetkx-win32-x64.vsix --pat "$VSCE_PAT"
          npx --yes @vscode/vsce publish --no-dependencies --packagePath uetkx.vsix --pat "$VSCE_PAT"
      - name: Publish to Open VSX (only if OVSX_TOKEN is set — optional community marketplace)
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions/vscode-uetkx
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: |
          if [ -z "$OVSX_TOKEN" ]; then
            echo "::notice::OVSX_TOKEN not set — skipping Open VSX (the VS Marketplace publish above is unaffected)."
            exit 0
          fi
          npx --yes ovsx publish uetkx-win32-x64.vsix -p "$OVSX_TOKEN"
          npx --yes ovsx publish uetkx.vsix -p "$OVSX_TOKEN"
        continue-on-error: true
      - name: Tag on VS Marketplace success
        if: steps.check.outputs.skip == 'false' && steps.publish-vsce.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "vscode-v${{ steps.check.outputs.version }}"
          git push origin "vscode-v${{ steps.check.outputs.version }}"
      - name: Upload VSIX artifacts (both flavors)
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: uetkx-vscode-${{ steps.check.outputs.version }}
          path: |
            ide-extensions/vscode-uetkx/uetkx.vsix
            ide-extensions/vscode-uetkx/uetkx-win32-x64.vsix

  # VS2022 extension — Windows (msbuild + VsixPublisher). Idempotent via `vs2022-v<ver>`; tags only on
  # a confirmed marketplace upload. The server + a pinned Node runtime are bundled so the VSIX is
  # self-contained. Bump the vsixmanifest Identity Version to ship a new one.
  publish-vs2022:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Guard (extension present?) + idempotency tag
        id: check
        shell: pwsh
        run: |
          $manifestPath = "ide-extensions/visual-studio/UetkxVsix/source.extension.vsixmanifest"
          if (-not (Test-Path $manifestPath)) {
            Write-Host "::notice::VS2022 extension not present — nothing to publish."
            echo "skip=true" >> $env:GITHUB_OUTPUT; exit 0
          }
          [xml]$manifest = Get-Content $manifestPath
          $version = $manifest.PackageManifest.Metadata.Identity.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          if (git tag --list "vs2022-v$version") {
            Write-Host "::notice::VS 2022 extension v$version already published — skipping"
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }
      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: 22
      - name: Build + bundle language server (+ Node runtime) into the VSIX
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          Push-Location ide-extensions/lsp-server; npm ci; npm run build; Pop-Location
          Push-Location ide-extensions/vscode-uetkx; npm ci; node scripts/bundle-server.mjs; Pop-Location
          Copy-Item -Recurse -Force ide-extensions/vscode-uetkx/server ide-extensions/visual-studio/UetkxVsix/server
          & ide-extensions/visual-studio/UetkxVsix/fetch-node.ps1
      - name: Stage bundled clangd (pinned 22.1.6, sha256-verified — §5)
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: node ide-extensions/scripts/fetch-clangd.mjs --target vs2022
      - name: Generate overview.md from centralized changelog
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: node ide-extensions/scripts/changelog.mjs extract-overview --ide vs2022 --template ide-extensions/visual-studio/UetkxVsix/overview-template.md --out ide-extensions/visual-studio/UetkxVsix/overview.md
      - name: Build VSIX
        if: steps.check.outputs.skip == 'false'
        shell: cmd
        working-directory: ide-extensions/visual-studio/UetkxVsix
        run: |
          set "VSWHERE=C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          for /f "usebackq tokens=*" %%i in (`"%VSWHERE%" -latest -prerelease -products * -requires Microsoft.Component.MSBuild -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL echo ERROR: No Visual Studio with MSBuild found via vswhere & exit /b 1
          echo Using Visual Studio at "%VSINSTALL%"
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -no_logo
          msbuild UetkxVsix.csproj -t:Restore -p:Configuration=Release -v:minimal
          msbuild UetkxVsix.csproj -t:Build -p:Configuration=Release -p:DeployExtension=false -v:minimal
          msbuild UetkxVsix.csproj -t:CreateVsixContainer -p:Configuration=Release -p:DeployExtension=false -v:minimal
      - name: Verify VSIX contains the language server + node
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        working-directory: ide-extensions/visual-studio/UetkxVsix
        run: |
          $vsix = Get-ChildItem -Recurse -Filter "*.vsix" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $vsix) { Write-Error "No VSIX found after build"; exit 1 }
          $zip = $vsix.FullName -replace '\.vsix$', '.zip'
          $tmp = Join-Path $env:TEMP 'vsix-verify'
          Copy-Item $vsix.FullName $zip -Force
          if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }
          Expand-Archive $zip $tmp -Force
          $server = Get-ChildItem $tmp -Recurse -Filter "server.js" | Where-Object { $_.Directory.Name -eq 'server' }
          if (-not $server) { Write-Host "::error::VSIX is missing server/server.js!"; Get-ChildItem $tmp -Recurse | ForEach-Object { Write-Host $_.FullName }; exit 1 }
          $node = Get-ChildItem $tmp -Recurse -Filter "node.exe" | Where-Object { $_.Directory.Name -eq 'server' }
          if (-not $node) { Write-Host "::error::VSIX is missing server/node.exe (fetch-node.ps1 failed)."; exit 1 }
          $clangd = Get-ChildItem $tmp -Recurse -Filter "clangd.exe" | Where-Object { $_.Directory.Name -eq 'bin' }
          if (-not $clangd) { Write-Host "::error::VSIX is missing clangd/bin/clangd.exe (fetch-clangd.mjs failed)."; exit 1 }
          Write-Host "Verified: VSIX contains server.js + bundled node.exe + bundled clangd.exe"
      - name: Locate VSIX
        if: steps.check.outputs.skip == 'false'
        id: find_vsix
        shell: pwsh
        working-directory: ide-extensions/visual-studio/UetkxVsix
        run: |
          $candidates = @("bin\Release\UetkxVsix.vsix", "bin\Release\net472\UetkxVsix.vsix", "UetkxVsix.vsix")
          $found = $null
          foreach ($c in $candidates) { if (Test-Path $c) { $found = (Resolve-Path $c).Path; break } }
          if (-not $found) {
            $vsix = Get-ChildItem -Recurse -Filter "*.vsix" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($vsix) { $found = $vsix.FullName }
          }
          if (-not $found) { Write-Host "::error::No .vsix found"; exit 1 }
          Write-Host "Found VSIX: $found"
          echo "VSIX_PATH=$found" >> $env:GITHUB_OUTPUT
      - name: Publish to VS Marketplace
        id: publish
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        working-directory: ide-extensions/visual-studio/UetkxVsix
        env:
          MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          $pub = Get-ChildItem -Path "$env:USERPROFILE\.nuget\packages\microsoft.vssdk.buildtools" -Recurse -Filter "VsixPublisher.exe" |
                 Where-Object { $_.DirectoryName -match 'tools[\\/]vssdk[\\/]bin$' } |
                 Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $pub) { Write-Host "::error::VsixPublisher.exe not found in NuGet cache"; exit 1 }
          $output = & $pub.FullName publish `
            -payload "${{ steps.find_vsix.outputs.VSIX_PATH }}" `
            -publishManifest publishManifest.json `
            -personalAccessToken $env:MARKETPLACE_TOKEN 2>&1 | Out-String
          $exitCode = $LASTEXITCODE
          Write-Host $output
          if ($output -match 'Uploaded') {
            Write-Host "Marketplace upload confirmed"
            $global:LASTEXITCODE = 0; exit 0
          } elseif ($exitCode -ne 0) {
            Write-Host "::error::VsixPublisher failed (exit $exitCode) with no upload confirmation"; exit $exitCode
          } else {
            Write-Host "::warning::VsixPublisher exited cleanly but no upload confirmation found"
          }
      - name: Tag on marketplace success
        if: steps.check.outputs.skip == 'false' && steps.publish.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "vs2022-v${{ steps.check.outputs.version }}"
          git push origin "vs2022-v${{ steps.check.outputs.version }}"
      - name: Upload VSIX artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: uetkx-vs2022-${{ steps.check.outputs.version }}
          path: ${{ steps.find_vsix.outputs.VSIX_PATH }}
