name: Bug report
description: Something is broken in the plugin, the .uetkx toolchain, or the IDE extensions
labels: [bug]
body:
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Plugin version, Unreal Engine version, and (if relevant) extension version
      placeholder: "ReactiveUI 0.1.0 · UE 5.6.1 · VS Code ext 0.1.0"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Smallest component/markup that shows it — .uetkx snippets welcome
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Relevant lines from Saved/Logs/<Project>.log, the Message Log (\"ReactiveUI\" page), or UETKX#### diagnostics"
      render: text
